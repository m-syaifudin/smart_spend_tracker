services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spend
      POSTGRES_PASSWORD: spend
      POSTGRES_DB: spend_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spend -d spend_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spend-net

volumes:
  pgdata:

networks:
  spend-net:
    name: spend-net