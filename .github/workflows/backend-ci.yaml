name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: spend
          POSTGRES_PASSWORD: spend
          POSTGRES_DB: spend_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spend -d spend_tracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://spend:spend@localhost:5432/spend_tracker_test
          TEST_DATABASE_URL: postgresql+asyncpg://spend:spend@localhost:5432/spend_tracker_test
          ENVIRONMENT: ci
          DEBUG: "false"
        run: uv run pytest -v

      - name: Build Docker image
        run: docker build -t spend-tracker-api:ci .